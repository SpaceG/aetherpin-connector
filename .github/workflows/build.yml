name: Build AetherPin Connector

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install astropy watchdog requests pyinstaller

      - name: Build .exe
        run: python build.py

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: AetherPin-Connector-Windows
          path: dist/AetherPin Connector.exe

  build-mac:
    # macos-latest is arm64. We force everything under Rosetta 2 with
    # `arch -x86_64` so pip pulls x86_64 wheels and PyInstaller emits a
    # x86_64 .app — runs natively on Intel, via Rosetta on Apple Silicon.
    # macos-13 (native Intel) was tried but the queue is unreliable;
    # universal2 was tried but watchdog ships only single-arch wheels.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (universal2)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (x86_64 via Rosetta)
        # Pin numpy<2 — numpy 2.x links against NEWLAPACK ILP64 symbols in
        # Accelerate that don't exist on macOS Monterey/Ventura (≤13.x).
        # MACOSX_DEPLOYMENT_TARGET=10.13 forces pip + PyInstaller to target
        # macOS High Sierra+ so the .app runs on every Mac of the last ~8
        # years. Without this, the host SDK (macOS 14/15 on macos-latest)
        # bakes in a min-target of 13.0+ → "Diese Software muss
        # aktualisiert werden" on Big Sur/Monterey.
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'
        run: |
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 pip install "numpy<2" astropy watchdog requests pyinstaller

      - name: Build .app (x86_64, target=10.13)
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'
        run: arch -x86_64 python build.py

      - name: Verify binary is x86_64
        run: |
          file "dist/AetherPin Connector.app/Contents/MacOS/AetherPin Connector"
          file "dist/AetherPin Connector.app/Contents/MacOS/AetherPin Connector" | grep -q "x86_64" || (echo "ERROR: binary is not x86_64"; exit 1)

      - name: Zip .app
        run: cd dist && zip -r AetherPin-Connector-Mac.zip "AetherPin Connector.app"

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: AetherPin-Connector-Mac
          path: dist/AetherPin-Connector-Mac.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install astropy watchdog requests pyinstaller

      - name: Build binary
        run: python build.py

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: AetherPin-Connector-Linux
          path: dist/AetherPin Connector
